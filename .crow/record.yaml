name: record

when:
    - event: cron
      sync: record
    - event: manual

depends_on:
    - build-ac
    - build-iv
    - build-dj

clone:
    - name: clone
      image: quay.io/amrkmn/crow/clone:1
      settings:
          partial: false

steps:
    - name: record
      image: docker.io/library/alpine:3.22
      environment:
          FORGEJO_SSH_KEY:
              from_secret: ssh_key
          FORGEJO_REMOTE:
              from_secret: forgejo_remote
      commands: |
          set -euo pipefail
          export GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=accept-new"

          apk add --no-cache curl git jq openssh-client

          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$FORGEJO_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          git remote set-url origin "$FORGEJO_REMOTE"

          version_override="${VERSION_OVERRIDE:-}"
          if [ -n "$version_override" ]; then
            version="$version_override"
          else
            raw_tag="$(curl --silent --show-error --fail \
              --retry 5 \
              --retry-all-errors \
              --retry-delay 2 \
              --connect-timeout 10 \
              --max-time 30 \
              "https://api.github.com/repos/9001/copyparty/releases/latest" \
              | jq -r '.tag_name')"
            version="${raw_tag#v}"
          fi

          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "Could not determine upstream copyparty version" >&2
            exit 1
          fi

          printf '%s\n' "$version" > .crow/.upstream.txt

          git config user.name "crow-ci[bot]"
          git config user.email "crow-ci[bot]@users.noreply.noz.one"
          git add .crow/.upstream.txt

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "chore: built Copyparty ${version} [skip ci]"
          git pull --rebase --autostash origin "${CI_COMMIT_BRANCH:-${CI_REPO_DEFAULT_BRANCH:-master}}"
          git push origin "HEAD:${CI_COMMIT_BRANCH:-${CI_REPO_DEFAULT_BRANCH:-master}}"
