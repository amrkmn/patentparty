name: Build and push

on:
  schedule:
    - cron: "37 * * * *" # run every hour to poll for new releases
  workflow_dispatch:
    inputs:
      version:
        description: "Which version to force build and push (e.g.: 1.20.9)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version: ${{ steps.check.outputs.version }}
      current_version: ${{ steps.check.outputs.current_version }}
      latest_version: ${{ steps.check.outputs.latest_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check latest upstream release
        id: check
        env:
          VERSION_OVERRIDE: ${{ github.event.inputs.version || '' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          current="$(cat .github/last_upstream_release.txt 2>/dev/null || true)"
          should_build=false

          api_ok=false
          latest_version=""

          if raw_tag="$(curl --silent --show-error --fail \
              --retry 5 \
              --retry-all-errors \
              --retry-delay 2 \
              --connect-timeout 10 \
              --max-time 30 \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/9001/copyparty/releases/latest" \
              | jq -r '.tag_name')"; then
            if [ -n "$raw_tag" ] && [ "$raw_tag" != "null" ]; then
              latest_version="${raw_tag#v}"
              api_ok=true
            fi
          fi

          if [ -n "$VERSION_OVERRIDE" ]; then
            version="$VERSION_OVERRIDE"
            should_build=true
          elif [ "$api_ok" = "true" ]; then
            version="$latest_version"

            if [ "$version" != "$current" ]; then
              if printf '%s\n%s\n' "$current" "$version" | sort -C -V; then
                should_build=true
              fi
            fi
          else
            # API failed and no manual version override: skip quietly
            version="$current"
            should_build=false
            echo "GitHub API request failed after retries; skipping this run."
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "latest_version=$latest_version" >> "$GITHUB_OUTPUT"
          echo "current_version=$current" >> "$GITHUB_OUTPUT"
          echo "should_build=$should_build" >> "$GITHUB_OUTPUT"

      - name: Show decision
        run: |
          echo "should_build    = ${{ steps.check.outputs.should_build }}"
          echo "current_version = ${{ steps.check.outputs.current_version }}"
          echo "build_version   = ${{ steps.check.outputs.version }}"
          echo "latest_version  = ${{ steps.check.outputs.latest_version }}"

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - variant: ac
            platforms: linux/amd64,linux/arm/v7,linux/s390x,linux/386,linux/arm64/v8,linux/ppc64le
          - variant: iv
            platforms: linux/amd64,linux/386,linux/arm64/v8
          - variant: dj
            platforms: linux/amd64,linux/386,linux/arm64/v8

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: "0x464e"
          password: ${{ secrets.DOCKER_PAT }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail

          variant="${{ matrix.variant }}"
          version="${{ needs.check.outputs.version }}"
          latest_version="${{ needs.check.outputs.latest_version }}"
          image="0x464e/patentparty"

          tags="${image}:${variant}-${version}"

          # only push "latest" tags when building the current upstream latest version
          if [ "$version" = "$latest_version" ]; then
            tags+=$'\n'"${image}:${variant}-latest"

            # also push plain "latest" tag for the "ac" variant, since it's the default/recommended variant
            if [ "$variant" = "ac" ]; then
              tags+=$'\n'"${image}:latest"
            fi
          fi

          {
            echo 'tags<<EOF'
            echo "$tags"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: ${{ matrix.platforms }}
          build-args: |
            VARIANT=${{ matrix.variant }}
            IMAGE_TAG=${{ needs.check.outputs.version }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  record:
    needs: [check, build]
    if: needs.check.outputs.should_build == 'true' && needs.build.result == 'success' && (github.event_name != 'workflow_dispatch' || github.event.inputs.version == '')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record built upstream release
        run: |
          printf '%s\n' '${{ needs.check.outputs.version }}' > .github/last_upstream_release.txt

      - name: Commit updated state
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/last_upstream_release.txt
          git commit -m "chore: built Copyparty ${{ needs.check.outputs.version }}" || exit 0
          git push
