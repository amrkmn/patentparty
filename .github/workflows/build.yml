name: build

"on":
    workflow_dispatch:
        inputs:
            version_override:
                description: "copyparty tag to build"
                required: false
                type: string
    schedule:
        - cron: "17 * * * *"

permissions:
    contents: write
    packages: write

concurrency:
    group: patentparty-build
    cancel-in-progress: false

env:
    IMAGE_PATH: amrkmn/patentparty

jobs:
    prepare:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
            should_build: ${{ steps.version.outputs.should_build }}
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Determine copyparty version
              id: version
              env:
                  VERSION_OVERRIDE: ${{ inputs.version_override }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail

                  version="${VERSION_OVERRIDE:-}"
                  if [ -z "$version" ]; then
                    version="$(curl -fsSL --retry 5 --retry-all-errors \
                      -H "Authorization: Bearer $GITHUB_TOKEN" \
                      -H "Accept: application/vnd.github+json" \
                      https://api.github.com/repos/9001/copyparty/releases/latest \
                      | jq -r '.tag_name | ltrimstr("v")')"
                  fi

                  if [ -z "$version" ] || [ "$version" = "null" ]; then
                    echo "Could not determine upstream copyparty version" >&2
                    exit 1
                  fi

                  current="$(cat .github/upstream.txt 2>/dev/null || true)"
                  should_build=true
                  if [ -z "${VERSION_OVERRIDE:-}" ] && [ "$version" = "$current" ]; then
                    should_build=false
                  fi

                  {
                    echo "version=$version"
                    echo "should_build=$should_build"
                  } >> "$GITHUB_OUTPUT"

                  echo "copyparty $version; should_build=$should_build"

    build:
        needs: prepare
        if: needs.prepare.outputs.should_build == 'true'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - variant: ac
                      platforms: linux/amd64,linux/arm/v7,linux/s390x,linux/386,linux/arm64/v8,linux/ppc64le
                    - variant: iv
                      platforms: linux/amd64,linux/386,linux/arm64/v8
                    - variant: dj
                      platforms: linux/amd64,linux/386,linux/arm64/v8
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Set up QEMU
              uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

            - name: Log in to Quay.io
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  registry: quay.io
                  username: ${{ secrets.QUAY_USERNAME }}
                  password: ${{ secrets.QUAY_PASSWORD }}

            - name: Log in to GHCR
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push image
              uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
              with:
                  context: .
                  platforms: ${{ matrix.platforms }}
                  push: true
                  build-args: |
                      VARIANT=${{ matrix.variant }}
                      IMAGE_TAG=${{ needs.prepare.outputs.version }}
                  tags: |
                      quay.io/${{ env.IMAGE_PATH }}/${{ matrix.variant }}:${{ needs.prepare.outputs.version }}
                      quay.io/${{ env.IMAGE_PATH }}/${{ matrix.variant }}:latest
                      ghcr.io/${{ env.IMAGE_PATH }}/${{ matrix.variant }}:${{ needs.prepare.outputs.version }}
                      ghcr.io/${{ env.IMAGE_PATH }}/${{ matrix.variant }}:latest
                  cache-from: type=gha,scope=${{ matrix.variant }}
                  cache-to: type=gha,scope=${{ matrix.variant }},mode=max

    record:
        needs:
            - prepare
            - build
        if: needs.prepare.outputs.should_build == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Record built version
              run: |
                  set -euo pipefail

                  printf '%s\n' "${{ needs.prepare.outputs.version }}" > .github/upstream.txt

                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git add .github/upstream.txt
                  git diff --cached --quiet && exit 0

                  git commit -m "chore: built copyparty ${{ needs.prepare.outputs.version }} [skip ci]"
                  git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
                  git push origin "HEAD:${GITHUB_REF_NAME}"
